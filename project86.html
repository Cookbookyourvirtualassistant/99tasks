<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clickable Prototype</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f1f5f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.phone{
    width:380px;
    height:760px;
    background:#fff;
    border:12px solid #111827;
    border-radius:35px;
    overflow:hidden;
    position:relative;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.screen{
    display:none;
    height:100%;
}

.screen.active{
    display:block;
}

/* Home Screen */
.header{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    padding:30px 20px;
}

.content{
    padding:20px;
}

.card{
    background:#f8fafc;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.back-btn{
    background:#ef4444;
}

.profile-box{
    text-align:center;
    padding:40px 20px;
}

.avatar{
    width:100px;
    height:100px;
    background:#2563eb;
    color:white;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:36px;
    margin:auto;
    margin-bottom:20px;
}
</style>
</head>
<body>

<div class="phone">

    <!-- HOME SCREEN -->
    <div id="home" class="screen active">

        <div class="header">
            <h2>Dashboard</h2>
            <p>Clickable Prototype Demo</p>
        </div>

        <div class="content">

            <div class="card">
                <h3>Profile Page</h3>
                <p>View user profile details.</p>
                <button class="btn" onclick="showScreen('profile')">
                    Open Profile
                </button>
            </div>

            <div class="card">
                <h3>Settings Page</h3>
                <p>Manage app preferences.</p>
                <button class="btn" onclick="showScreen('settings')">
                    Open Settings
                </button>
            </div>

        </div>
    </div>

    <!-- PROFILE SCREEN -->
    <div id="profile" class="screen">

        <div class="header">
            <h2>Profile</h2>
        </div>

        <div class="profile-box">
            <div class="avatar">J</div>

            <h3>John Smith</h3>
            <p>UI/UX Designer</p>

            <button class="btn back-btn"
                    onclick="showScreen('home')">
                Back
            </button>
        </div>

    </div>

    <!-- SETTINGS SCREEN -->
    <div id="settings" class="screen">

        <div class="header">
            <h2>Settings</h2>
        </div>

        <div class="content">

            <div class="card">
                <h3>Notifications</h3>
                <p>Manage alerts and updates.</p>
            </div>

            <div class="card">
                <h3>Privacy</h3>
                <p>Control account privacy settings.</p>
            </div>

            <button class="btn back-btn"
                    onclick="showScreen('home')">
                Back
            </button>

        </div>

    </div>

</div>

<script>
function showScreen(screenId){

    let screens =
        document.querySelectorAll('.screen');

    screens.forEach(screen => {
        screen.classList.remove('active');
    });

    document
        .getElementById(screenId)
        .classList.add('active');
}
</script>

</body>
</html>

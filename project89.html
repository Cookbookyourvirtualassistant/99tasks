<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile App Splash Screen</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e5e7eb;
}

.phone{
    width:360px;
    height:740px;
    border:12px solid #111827;
    border-radius:40px;
    overflow:hidden;
    position:relative;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.splash{
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#2563eb,#7c3aed,#06b6d4);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
    position:relative;
}

/* Decorative circles */
.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.12);
}

.circle1{
    width:220px;
    height:220px;
    top:-60px;
    right:-60px;
}

.circle2{
    width:160px;
    height:160px;
    bottom:-40px;
    left:-40px;
}

.logo{
    width:120px;
    height:120px;
    border-radius:30px;
    background:white;
    color:#2563eb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    font-weight:800;
    margin-bottom:25px;
    animation:float 2s ease-in-out infinite;
}

.app-name{
    font-size:2.2rem;
    font-weight:800;
    letter-spacing:1px;
}

.tagline{
    margin-top:10px;
    font-size:1rem;
    opacity:0.9;
}

.loader{
    margin-top:40px;
    display:flex;
    gap:8px;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:white;
    animation:bounce 1.2s infinite;
}

.dot:nth-child(2){
    animation-delay:0.2s;
}

.dot:nth-child(3){
    animation-delay:0.4s;
}

@keyframes bounce{
    0%,80%,100%{
        transform:scale(0.6);
        opacity:0.5;
    }
    40%{
        transform:scale(1);
        opacity:1;
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}
</style>
</head>
<body>

<div class="phone">

    <div class="splash">

        <div class="circle circle1"></div>
        <div class="circle circle2"></div>

        <div class="logo">
            A
        </div>

        <h1 class="app-name">APP NAME</h1>

        <p class="tagline">
            Smart • Fast • Reliable
        </p>

        <div class="loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagination Design</title>

<style>
    body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f4f4f4;
    }

    .pagination {
        display: flex;
        gap: 8px;
    }

    .pagination a {
        text-decoration: none;
        color: #333;
        padding: 10px 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #fff;
        transition: 0.3s;
    }

    .pagination a:hover {
        background: #007bff;
        color: #fff;
        border-color: #007bff;
    }

    .pagination a.active {
        background: #007bff;
        color: #fff;
        border-color: #007bff;
    }

    .pagination a.prev,
    .pagination a.next {
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="pagination">
    <a href="#" class="prev">« Prev</a>
    <a href="#" class="active">1</a>
    <a href="#">2</a>
    <a href="#">3</a>
    <a href="#">4</a>
    <a href="#">5</a>
    <a href="#" class="next">Next »</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Light Mode UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f7fa;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:400px;
    background:#ffffff;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.card h1{
    color:#333;
    margin-bottom:15px;
}

.card p{
    color:#666;
    margin-bottom:20px;
    line-height:1.5;
}

.btn{
    background:#007bff;
    color:#fff;
    border:none;
    padding:12px 24px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

.btn:hover{
    background:#0056b3;
}
</style>
</head>
<body>

<div class="card">
    <h1>Light Mode UI</h1>
    <p>
        Clean and modern light theme interface using HTML and CSS.
    </p>
    <button class="btn">Get Started</button>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Mode UI</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#121212;
        color:#ffffff;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .container{
        width:400px;
        background:#1e1e1e;
        padding:30px;
        border-radius:12px;
        box-shadow:0 4px 15px rgba(0,0,0,0.5);
        text-align:center;
    }

    h1{
        margin-bottom:15px;
    }

    p{
        color:#bdbdbd;
        margin-bottom:20px;
    }

    .btn{
        background:#6200ea;
        color:white;
        border:none;
        padding:12px 20px;
        border-radius:8px;
        cursor:pointer;
        font-size:16px;
        transition:0.3s;
    }

    .btn:hover{
        background:#7c4dff;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Dark Mode UI</h1>
    <p>Modern dark theme design using HTML and CSS.</p>
    <button class="btn">Get Started</button>
</div>

</body>
</html>

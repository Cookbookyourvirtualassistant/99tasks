<!DOCTYPE html>
<html>
<head>
    <title>Breadcrumb Navigation</title>
    <style>
        .breadcrumb {
            list-style: none;
            display: flex;
            padding: 10px;
            background: #f4f4f4;
            border-radius: 5px;
        }

        .breadcrumb li {
            margin-right: 10px;
        }

        .breadcrumb li a {
            text-decoration: none;
            color: #007bff;
        }

        .breadcrumb li::after {
            content: ">";
            margin-left: 10px;
            color: #666;
        }

        .breadcrumb li:last-child::after {
            content: "";
        }

        .breadcrumb li:last-child {
            color: #555;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <ul class="breadcrumb">
        <li><a href="#">Home</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">Electronics</a></li>
        <li>Mobile Phones</li>
    </ul>

</body>
</html>

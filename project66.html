<!DOCTYPE html>
<html>
<head>
<title>YouTube Thumbnail</title>
<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#222;
    font-family:Arial, sans-serif;
}

.thumbnail{
    width:1280px;
    height:720px;
    background:linear-gradient(135deg,#ff0000,#ff6600);
    position:relative;
    overflow:hidden;
    color:white;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.35);
}

.content{
    position:absolute;
    left:60px;
    top:50%;
    transform:translateY(-50%);
    z-index:2;
}

.content h1{
    font-size:90px;
    margin:0;
    font-weight:900;
    text-transform:uppercase;
    text-shadow:4px 4px 10px rgba(0,0,0,0.5);
}

.content p{
    font-size:40px;
    margin-top:20px;
    font-weight:bold;
}

.badge{
    position:absolute;
    top:30px;
    right:30px;
    background:#ff0000;
    padding:15px 30px;
    border-radius:10px;
    font-size:28px;
    font-weight:bold;
    z-index:2;
}

.play-btn{
    position:absolute;
    right:120px;
    top:50%;
    transform:translateY(-50%);
    width:180px;
    height:130px;
    background:white;
    border-radius:25px;
    z-index:2;
}

.play-btn:before{
    content:"";
    position:absolute;
    left:70px;
    top:35px;
    border-left:50px solid red;
    border-top:30px solid transparent;
    border-bottom:30px solid transparent;
}
</style>
</head>
<body>

<div class="thumbnail">
    <div class="overlay"></div>

    <div class="badge">NEW VIDEO</div>

    <div class="content">
        <h1>Learn Python</h1>
        <p>Complete Beginner Tutorial</p>
    </div>

    <div class="play-btn"></div>
</div>

</body>
</html>

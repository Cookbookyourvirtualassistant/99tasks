<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media Post</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f2f4f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.post-card{
    width:400px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.post-header{
    display:flex;
    align-items:center;
    padding:15px;
}

.profile-pic{
    width:50px;
    height:50px;
    border-radius:50%;
    background:#4f46e5;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    font-size:20px;
}

.user-info{
    margin-left:12px;
}

.user-info h3{
    font-size:16px;
    color:#333;
}

.user-info p{
    font-size:12px;
    color:#777;
}

.post-image{
    width:100%;
    height:250px;
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:28px;
    font-weight:bold;
}

.post-content{
    padding:15px;
}

.post-content p{
    color:#555;
    line-height:1.5;
}

.post-actions{
    display:flex;
    justify-content:space-around;
    padding:12px;
    border-top:1px solid #eee;
}

.btn{
    border:none;
    background:none;
    cursor:pointer;
    color:#555;
    font-size:15px;
    transition:0.3s;
}

.btn:hover{
    color:#4f46e5;
}
</style>
</head>
<body>

<div class="post-card">

    <div class="post-header">
        <div class="profile-pic">C</div>
        <div class="user-info">
            <h3>Chandru</h3>
            <p>2 hours ago</p>
        </div>
    </div>

    <div class="post-image">
        Your Brand Here
    </div>

    <div class="post-content">
        <p>
            🚀 Launching our new product! Experience innovation,
            performance, and style like never before.
            #Technology #Innovation #Business
        </p>
    </div>

    <div class="post-actions">
        <button class="btn">👍 Like</button>
        <button class="btn">💬 Comment</button>
        <button class="btn">📤 Share</button>
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Interface</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#eef2f7;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.chat-container{
    width:420px;
    height:700px;
    background:#fff;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    display:flex;
    flex-direction:column;
}

/* Header */
.chat-header{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    padding:20px;
    display:flex;
    align-items:center;
    gap:12px;
}

.bot-avatar{
    width:50px;
    height:50px;
    border-radius:50%;
    background:white;
    color:#2563eb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    font-size:20px;
}

.status{
    font-size:13px;
    opacity:0.85;
}

/* Chat Area */
.chat-body{
    flex:1;
    padding:20px;
    overflow-y:auto;
    background:#f8fafc;
}

.message{
    max-width:75%;
    padding:12px 15px;
    margin-bottom:15px;
    border-radius:16px;
    line-height:1.5;
    font-size:14px;
}

.bot{
    background:#e2e8f0;
    color:#111827;
    border-top-left-radius:5px;
}

.user{
    background:#2563eb;
    color:white;
    margin-left:auto;
    border-top-right-radius:5px;
}

.time{
    font-size:11px;
    opacity:0.7;
    margin-top:5px;
}

/* Quick Actions */
.quick-actions{
    display:flex;
    gap:10px;
    padding:10px 15px;
    overflow-x:auto;
    background:white;
    border-top:1px solid #e5e7eb;
}

.quick-btn{
    white-space:nowrap;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    background:#eff6ff;
    color:#2563eb;
    cursor:pointer;
    font-size:13px;
}

/* Input Area */
.chat-footer{
    display:flex;
    align-items:center;
    gap:10px;
    padding:15px;
    border-top:1px solid #e5e7eb;
    background:white;
}

.chat-input{
    flex:1;
    border:1px solid #cbd5e1;
    border-radius:30px;
    padding:12px 15px;
    outline:none;
}

.send-btn{
    width:45px;
    height:45px;
    border:none;
    border-radius:50%;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:18px;
}
</style>
</head>
<body>

<div class="chat-container">

    <!-- Header -->
    <div class="chat-header">
        <div class="bot-avatar">AI</div>

        <div>
            <h3>Smart Assistant</h3>
            <div class="status">● Online</div>
        </div>
    </div>

    <!-- Chat Messages -->
    <div class="chat-body">

        <div class="message bot">
            Hello! How can I help you today?
            <div class="time">10:00 AM</div>
        </div>

        <div class="message user">
            I want information about your services.
            <div class="time">10:01 AM</div>
        </div>

        <div class="message bot">
            We offer web development, UI/UX design,
            mobile apps, and digital marketing services.
            <div class="time">10:01 AM</div>
        </div>

        <div class="message user">
            Can I get a pricing estimate?
            <div class="time">10:02 AM</div>
        </div>

    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
        <button class="quick-btn">Pricing</button>
        <button class="quick-btn">Services</button>
        <button class="quick-btn">Contact</button>
        <button class="quick-btn">Support</button>
    </div>

    <!-- Input -->
    <div class="chat-footer">
        <input
            type="text"
            class="chat-input"
            placeholder="Type a message..."
        >

        <button class="send-btn">
            ➤
        </button>
    </div>

</div>

</body>
</html>

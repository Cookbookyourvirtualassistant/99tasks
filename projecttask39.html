<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Image Slider</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.slider{
    position:relative;
    width:90%;
    max-width:1000px;
    height:550px;
    overflow:hidden;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.slides{
    display:flex;
    width:100%;
    height:100%;
    transition:transform 0.5s ease-in-out;
}

.slide{
    min-width:100%;
    position:relative;
}

.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.caption{
    position:absolute;
    bottom:40px;
    left:40px;
    color:white;
    background:rgba(0,0,0,0.45);
    padding:15px 20px;
    border-radius:12px;
    backdrop-filter:blur(5px);
}

.caption h2{
    margin-bottom:8px;
}

/* Navigation Buttons */

.btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,0.8);
    cursor:pointer;
    font-size:22px;
    z-index:10;
    transition:.3s;
}

.btn:hover{
    background:white;
}

.prev{
    left:20px;
}

.next{
    right:20px;
}

/* Dots */

.dots{
    position:absolute;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:rgba(255,255,255,.6);
    cursor:pointer;
    transition:.3s;
}

.dot.active{
    background:white;
    transform:scale(1.3);
}

@media(max-width:768px){

.slider{
    height:350px;
}

.caption{
    left:20px;
    right:20px;
    bottom:30px;
}

.caption h2{
    font-size:20px;
}
}
</style>
</head>
<body>

<div class="slider">

    <div class="slides">

        <div class="slide">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1600" alt="">
            <div class="caption">
                <h2>Mountain Adventure</h2>
                <p>Explore breathtaking landscapes.</p>
            </div>
        </div>

        <div class="slide">
            <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1600" alt="">
            <div class="caption">
                <h2>Desert Journey</h2>
                <p>Discover the beauty of endless dunes.</p>
            </div>
        </div>

        <div class="slide">
            <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?w=1600" alt="">
            <div class="caption">
                <h2>City Lights</h2>
                <p>Experience vibrant urban life.</p>
            </div>
        </div>

    </div>

    <button class="btn prev">&#10094;</button>
    <button class="btn next">&#10095;</button>

    <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

</div>

<script>
const slides = document.querySelector('.slides');
const dots = document.querySelectorAll('.dot');

let current = 0;
const total = dots.length;

function updateSlider() {
    slides.style.transform = `translateX(-${current * 100}%)`;

    dots.forEach(dot => dot.classList.remove('active'));
    dots[current].classList.add('active');
}

document.querySelector('.next').onclick = () => {
    current = (current + 1) % total;
    updateSlider();
};

document.querySelector('.prev').onclick = () => {
    current = (current - 1 + total) % total;
    updateSlider();
};

dots.forEach((dot, index) => {
    dot.addEventListener('click', () => {
        current = index;
        updateSlider();
    });
});

// Auto Slide
setInterval(() => {
    current = (current + 1) % total;
    updateSlider();
}, 5000);
</script>

</body>
</html>

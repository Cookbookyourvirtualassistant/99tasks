<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallax Sections</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    line-height:1.6;
}

.parallax{
    height:100vh;
    background-attachment:fixed;
    background-position:center;
    background-repeat:no-repeat;
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:3rem;
    font-weight:bold;
    text-shadow:2px 2px 10px rgba(0,0,0,0.7);
}

.bg1{
    background-image:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb');
}

.bg2{
    background-image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee');
}

.bg3{
    background-image:url('https://images.unsplash.com/photo-1511884642898-4c92249e20b6');
}

.content{
    padding:80px 10%;
    text-align:center;
    background:#fff;
}

.content h2{
    margin-bottom:20px;
    color:#333;
}

.content p{
    color:#666;
    font-size:18px;
}
</style>
</head>
<body>

<div class="parallax bg1">
    Welcome
</div>

<section class="content">
    <h2>About Us</h2>
    <p>
        This section appears between parallax backgrounds.
        Scroll down to see the parallax effect in action.
    </p>
</section>

<div class="parallax bg2">
    Nature
</div>

<section class="content">
    <h2>Our Services</h2>
    <p>
        Create beautiful scrolling experiences with CSS parallax effects.
    </p>
</section>

<div class="parallax bg3">
    Explore
</div>

<section class="content">
    <h2>Contact</h2>
    <p>
        Thank you for visiting our parallax webpage.
    </p>
</section>

</body>
</html>

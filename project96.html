<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Email</title>
<style>
@media only screen and (max-width: 600px) {
    .container {
        width: 100% !important;
    }

    .content {
        padding: 20px !important;
    }

    .button {
        display: block !important;
        width: 100% !important;
    }
}
</style>
</head>

<body style="margin:0; padding:0; background:#f4f4f4; font-family:Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f4f4f4">
<tr>
<td align="center">

<table class="container" width="600" cellpadding="0" cellspacing="0" border="0"
style="background:#ffffff; margin:20px auto;">

    <!-- Header -->
    <tr>
        <td align="center"
            style="background:#007BFF; color:#ffffff; padding:30px;">
            <h1 style="margin:0;">Welcome!</h1>
        </td>
    </tr>

    <!-- Content -->
    <tr>
        <td class="content" style="padding:40px;">
            <h2>Hello Subscriber,</h2>

            <p style="color:#555555; line-height:1.6;">
                Thank you for joining our newsletter. Stay updated with
                the latest news, offers, and updates delivered directly
                to your inbox.
            </p>

            <p style="text-align:center;">
                <a href="#"
                   class="button"
                   style="background:#007BFF;
                          color:#ffffff;
                          text-decoration:none;
                          padding:12px 25px;
                          border-radius:5px;
                          display:inline-block;">
                    Get Started
                </a>
            </p>
        </td>
    </tr>

    <!-- Footer -->
    <tr>
        <td align="center"
            style="background:#eeeeee;
                   padding:20px;
                   color:#777777;
                   font-size:14px;">
            © 2026 Your Company. All Rights Reserved.
        </td>
    </tr>

</table>

</td>
</tr>
</table>

</body>
</html>

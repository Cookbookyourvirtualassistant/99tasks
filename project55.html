<!DOCTYPE html>
<html>
<head>
<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 100px;
}

.hover-btn{
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    background: #4CAF50;
    color: white;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.3s ease;
}

.hover-btn:hover{
    background: #45a049;
    transform: scale(1.1);
    box-shadow: 0 8px 15px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<button class="hover-btn">Hover Me</button>

</body>
</html>

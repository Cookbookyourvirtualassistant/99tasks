<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Banner</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
}

.banner{
    height:300px;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    overflow:hidden;
    position:relative;
    color:white;
    text-align:center;
}

.banner h1{
    font-size:3rem;
    animation:slideDown 1.5s ease;
}

.banner p{
    font-size:1.2rem;
    margin-top:10px;
    animation:fadeIn 2s ease;
}

.btn{
    margin-top:20px;
    padding:12px 25px;
    background:white;
    color:#333;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    transition:0.3s;
    animation:popUp 2.5s ease;
}

.btn:hover{
    transform:scale(1.1);
}

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    animation:float 8s infinite linear;
}

.circle:nth-child(1){
    width:100px;
    height:100px;
    left:10%;
    top:70%;
}

.circle:nth-child(2){
    width:150px;
    height:150px;
    right:15%;
    top:20%;
}

.circle:nth-child(3){
    width:70px;
    height:70px;
    left:70%;
    top:80%;
}

@keyframes slideDown{
    from{
        opacity:0;
        transform:translateY(-50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes popUp{
    from{
        opacity:0;
        transform:scale(0.5);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes float{
    0%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-30px);
    }
    100%{
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="banner">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <h1>Welcome to Our Website</h1>
    <p>Create stunning web experiences with modern design.</p>
    <a href="#" class="btn">Get Started</a>
</div>

</body>
</html>

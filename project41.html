<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Popup Modal</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f5f5f5;
    }

    .open-btn {
        padding: 12px 24px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    }

    .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .modal {
        background: white;
        width: 400px;
        max-width: 90%;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        animation: popup 0.3s ease;
        position: relative;
    }

    @keyframes popup {
        from {
            opacity: 0;
            transform: scale(0.8);
        }
        to {
            opacity: 1;
            transform: scale(1);
        }
    }

    .close-btn {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 22px;
        cursor: pointer;
        color: #666;
    }

    .modal h2 {
        margin-bottom: 12px;
        color: #222;
    }

    .modal p {
        color: #555;
        margin-bottom: 20px;
        line-height: 1.5;
    }

    .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
    }

    .btn {
        padding: 10px 18px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    .btn-cancel {
        background: #e5e7eb;
        color: #333;
    }

    .btn-confirm {
        background: #4f46e5;
        color: white;
    }
</style>
</head>
<body>

<button class="open-btn" onclick="openModal()">
    Open Modal
</button>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>

        <h2>Confirmation</h2>
        <p>
            Are you sure you want to proceed with this action?
        </p>

        <div class="modal-footer">
            <button class="btn btn-cancel" onclick="closeModal()">
                Cancel
            </button>
            <button class="btn btn-confirm">
                Confirm
            </button>
        </div>
    </div>
</div>

<script>
function openModal() {
    document.getElementById("modalOverlay").style.display = "flex";
}

function closeModal() {
    document.getElementById("modalOverlay").style.display = "none";
}

// Close when clicking outside modal
document.getElementById("modalOverlay").addEventListener("click", function(e) {
    if (e.target === this) {
        closeModal();
    }
});
</script>

</body>
</html>

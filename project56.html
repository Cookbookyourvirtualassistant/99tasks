<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Effects</title>

<style>
html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
}

section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 40px;
    color: white;
}

.sec1 { background: #3498db; }
.sec2 { background: #2ecc71; }
.sec3 { background: #e74c3c; }

.fade-in {
    opacity: 0;
    transform: translateY(50px);
    transition: all 1s ease;
}

.fade-in.show {
    opacity: 1;
    transform: translateY(0);
}

nav {
    position: fixed;
    top: 10px;
    width: 100%;
    text-align: center;
}

nav a {
    background: white;
    padding: 10px 15px;
    margin: 5px;
    text-decoration: none;
    color: black;
    border-radius: 5px;
}
</style>
</head>

<body>

<nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
</nav>

<section id="home" class="sec1 fade-in">
    Home Section
</section>

<section id="about" class="sec2 fade-in">
    About Section
</section>

<section id="contact" class="sec3 fade-in">
    Contact Section
</section>

<script>
const elements = document.querySelectorAll('.fade-in');

window.addEventListener('scroll', () => {
    elements.forEach(element => {
        const position = element.getBoundingClientRect().top;
        const screenPosition = window.innerHeight / 1.3;

        if(position < screenPosition) {
            element.classList.add('show');
        }
    });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infographic Layout</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:#f4f6f9;
    padding:40px;
}
.infographic{
    max-width:1000px;
    margin:auto;
}
.header{
    text-align:center;
    margin-bottom:40px;
}
.header h1{
    color:#333;
    font-size:40px;
}
.header p{
    color:#666;
}
.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:40px;
}
.card{
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.card h2{
    color:#4CAF50;
    font-size:36px;
}
.card p{
    color:#555;
}
.timeline{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:20px;
}
.step{
    flex:1;
    min-width:180px;
    background:#fff;
    padding:20px;
    border-left:5px solid #4CAF50;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.step h3{
    color:#333;
    margin-bottom:10px;
}
.step p{
    color:#666;
}
</style>
</head>
<body>

<div class="infographic">

    <div class="header">
        <h1>Business Growth Infographic</h1>
        <p>Key statistics and progress overview</p>
    </div>

    <div class="stats">
        <div class="card">
            <h2>85%</h2>
            <p>Customer Satisfaction</p>
        </div>

        <div class="card">
            <h2>120K</h2>
            <p>Monthly Visitors</p>
        </div>

        <div class="card">
            <h2>250+</h2>
            <p>Projects Completed</p>
        </div>

        <div class="card">
            <h2>50%</h2>
            <p>Revenue Growth</p>
        </div>
    </div>

    <div class="timeline">
        <div class="step">
            <h3>Step 1</h3>
            <p>Research and Planning</p>
        </div>

        <div class="step">
            <h3>Step 2</h3>
            <p>Design and Development</p>
        </div>

        <div class="step">
            <h3>Step 3</h3>
            <p>Testing and Launch</p>
        </div>

        <div class="step">
            <h3>Step 4</h3>
            <p>Growth and Optimization</p>
        </div>
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>LinkedIn Banner</title>
<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f0f2f5;
}
.banner{
    width:1584px;
    height:396px;
    background:linear-gradient(135deg,#0a66c2,#004182);
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 80px;
    box-sizing:border-box;
}
.content h1{
    font-size:48px;
    margin:0;
}
.content p{
    font-size:22px;
    margin-top:10px;
}
.circle{
    width:220px;
    height:220px;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    border:4px solid rgba(255,255,255,0.3);
}
</style>
</head>
<body>

<div class="banner">
    <div class="content">
        <h1>Your Name</h1>
        <p>Web Developer | Python Programmer | UI Designer</p>
    </div>
    <div class="circle"></div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Banner</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">

  <!-- HERO BANNER -->
  <section class="relative overflow-hidden">
    <!-- Background gradient -->
    <div class="absolute inset-0 bg-gradient-to-br from-gray-50 via-white to-gray-100 -z-10"></div>
    
    <div class="max-w-6xl mx-auto px-6 py-20 md:py-32">
      <div class="grid-cols-1 lg:grid-cols-2 gap-12 items-center">
        
        <!-- Left: Text content -->
        <div class="text-center lg:text-left">
          <!-- Badge -->
          <div class="inline-flex items-center gap-2 bg-black text-white text-sm px-4 py-1.5 rounded-full mb-6">
            <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
            New: AI-powered analytics
          </div>
          
          <!-- Headline -->
          <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold tracking-tight leading-tight">
            Ship faster with 
            <span class="bg-gradient-to-r from-black to-gray-600 bg-clip-text text-transparent">
              zero backend
            </span>
          </h1>
          
          <!-- Subheadline -->
          <p class="mt-6 text-lg sm:text-xl text-gray-600 max-w-xl mx-auto lg:mx-0">
            Auth, database, and hosting in one SDK. Build your app in hours, not weeks. 
            Trusted by 10,000+ developers.
          </p>
          
          <!-- CTA Buttons -->
          <div class="mt-8 flex-col sm:flex-row gap-4 justify-center lg:justify-start">
            <button class="bg-black text-white px-8 py-4 rounded-xl font-semibold hover:bg-gray-800 transition-all hover:shadow-lg hover:scale-105">
              Start Free Trial
            </button>
            <button class="border-2 border-gray-300 px-8 py-4 rounded-xl font-semibold hover:border-gray-400 hover:bg-gray-50 transition-all">
              Watch Demo
            </button>
          </div>
          
          <!-- Trust indicators -->
          <div class="mt-10 flex-wrap justify-center lg:justify-start items-center gap-x-6 gap-y-2 text-sm text-gray-500">
            <span>✓ No credit card required</span>
            <span>✓ 14-day free trial</span>
            <span>✓ Cancel anytime</span>
          </div>
        </div>
        
        <!-- Right: Image/Dashboard -->
        <div class="relative">
          <!-- Glow effect -->
          <div class="absolute inset-0 bg-gradient-to-r from-blue-400 to-purple-500 rounded-3xl blur-3xl opacity-20"></div>
          
          <!-- Mock dashboard -->
          <div class="relative bg-white rounded-2xl shadow-2xl border-gray-200 overflow-hidden">
            <div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex gap-2">
              <div class="w-3 h-3 rounded-full bg-red-400"></div>
              <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
              <div class="w-3 h-3 rounded-full bg-green-400"></div>
            </div>
            <div class="p-6 md:p-8">
              <div class="h-6 bg-gray-200 rounded w-1/3 mb-6"></div>
              <div class="grid-cols-3 gap-4 mb-6">
                <div class="bg-gradient-to-br from-blue-50 to-blue-100 p-4 rounded-xl">
                  <div class="h-3 bg-blue-300 rounded w-1/2 mb-2"></div>
                  <div class="h-6 bg-blue-400 rounded w-3/4"></div>
                </div>
                <div class="bg-gradient-to-br from-purple-50 to-purple-100 p-4 rounded-xl">
                  <div class="h-3 bg-purple-300 rounded w-1/2 mb-2"></div>
                  <div class="h-6 bg-purple-400 rounded w-3/4"></div>
                </div>
                <div class="bg-gradient-to-br from-green-50 to-green-100 p-4 rounded-xl">
                  <div class="h-3 bg-green-300 rounded w-1/2 mb-2"></div>
                  <div class="h-6 bg-green-400 rounded w-3/4"></div>
                </div>
              </div>
              <div class="h-32 bg-gray-100 rounded-xl"></div>
            </div>
          </div>
        </div>
        
      </div>
    </div>
  </section>

</body>
</html>

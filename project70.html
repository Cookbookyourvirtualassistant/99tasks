<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette System</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    padding:40px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.palette{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
    gap:20px;
    max-width:1000px;
    margin:auto;
}

.color-card{
    border-radius:12px;
    overflow:hidden;
    background:#fff;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.color{
    height:120px;
}

.info{
    padding:15px;
    text-align:center;
}

.info h3{
    margin:0;
}

.info p{
    margin:5px 0 0;
    color:#666;
    font-size:14px;
}

/* Color System */
.primary   { background:#2563EB; }
.secondary { background:#7C3AED; }
.success   { background:#16A34A; }
.warning   { background:#F59E0B; }
.danger    { background:#DC2626; }
.neutral   { background:#6B7280; }
</style>
</head>
<body>

<h1>Design System Color Palette</h1>

<div class="palette">

    <div class="color-card">
        <div class="color primary"></div>
        <div class="info">
            <h3>Primary</h3>
            <p>#2563EB</p>
        </div>
    </div>

    <div class="color-card">
        <div class="color secondary"></div>
        <div class="info">
            <h3>Secondary</h3>
            <p>#7C3AED</p>
        </div>
    </div>

    <div class="color-card">
        <div class="color success"></div>
        <div class="info">
            <h3>Success</h3>
            <p>#16A34A</p>
        </div>
    </div>

    <div class="color-card">
        <div class="color warning"></div>
        <div class="info">
            <h3>Warning</h3>
            <p>#F59E0B</p>
        </div>
    </div>

    <div class="color-card">
        <div class="color danger"></div>
        <div class="info">
            <h3>Danger</h3>
            <p>#DC2626</p>
        </div>
    </div>

    <div class="color-card">
        <div class="color neutral"></div>
        <div class="info">
            <h3>Neutral</h3>
            <p>#6B7280</p>
        </div>
    </div>

</div>

</body>
</html>

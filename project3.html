<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- NAVBAR -->
  <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      
      <!-- Logo -->
      <a href="/" class="font-bold text-xl tracking-tight">YourBrand</a>
      
      <!-- Desktop Links -->
      <div class="hidden md:flex gap-8">
        <a href="#features" class="text-gray-600 hover:text-black font-medium transition-colors">Features</a>
        <a href="#pricing" class="text-gray-600 hover:text-black font-medium transition-colors">Pricing</a>
        <a href="#about" class="text-gray-600 hover:text-black font-medium transition-colors">About</a>
        <a href="#contact" class="text-gray-600 hover:text-black font-medium transition-colors">Contact</a>
      </div>
      
      <!-- Desktop CTA -->
      <div class="hidden md:flex gap-3">
        <button class="text-gray-600 hover:text-black font-medium px-4 py-2 transition-colors">Login</button>
        <button class="bg-black text-white px-5 py-2 rounded-lg font-medium hover:bg-gray-800 transition-colors">
          Get Started
        </button>
      </div>
      
      <!-- Mobile Menu Button -->
      <button id="menu-btn" class="md:hidden text-2xl focus:outline-none">
        <span id="menu-icon">☰</span>
      </button>
    </div>
    
    <!-- Mobile Menu - Hidden by default -->
    <div id="mobile-menu" class="hidden md:hidden px-6 pb-6 flex-col gap-4 border-t border-gray-100 pt-4 bg-white">
      <a href="#features" class="text-gray-700 hover:text-black font-medium py-2">Features</a>
      <a href="#pricing" class="text-gray-700 hover:text-black font-medium py-2">Pricing</a>
      <a href="#about" class="text-gray-700 hover:text-black font-medium py-2">About</a>
      <a href="#contact" class="text-gray-700 hover:text-black font-medium py-2">Contact</a>
      <div class="pt-4 border-t border-gray-100 flex-col gap-3">
        <button class="text-left text-gray-700 hover:text-black font-medium py-2">Login</button>
        <button class="bg-black text-white px-5 py-3 rounded-lg font-medium w-full hover:bg-gray-800 transition-colors">
          Get Started
        </button>
      </div>
    </div>
  </nav>

  <!-- Demo content so you can see sticky effect -->
  <section class="max-w-4xl mx-auto px-6 py-20">
    <h1 class="text-4xl font-bold mb-6">Scroll down to test sticky navbar</h1>
    <p class="text-gray-600 mb-4">This navbar stays on top with glassmorphism blur effect.</p>
    <p class="text-gray-600 mb-4">Resize window to see mobile menu toggle.</p>
    <div class="h-96 bg-gray-200 rounded-xl flex items-center justify-center text-gray-500 mt-12">
      Demo content
    </div>
    <div class="h-96 bg-gray-200 rounded-xl flex items-center justify-center text-gray-500 mt-12">
      More content
    </div>
  </section>

  <script>
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const menuIcon = document.getElementById('menu-icon');
    
    menuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
      menuIcon.textContent = mobileMenu.classList.contains('hidden') ? '☰' : '✕';
    });
  </script>

</body>
</html>

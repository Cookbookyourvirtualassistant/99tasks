<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Advertisement</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.banner{
    width:900px;
    height:250px;
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    border-radius:20px;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:40px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.content h1{
    font-size:42px;
    margin-bottom:10px;
}

.content p{
    font-size:18px;
    margin-bottom:20px;
}

.btn{
    display:inline-block;
    background:white;
    color:#4f46e5;
    padding:12px 25px;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

.offer{
    width:180px;
    height:180px;
    background:rgba(255,255,255,0.2);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

@media(max-width:768px){
    .banner{
        flex-direction:column;
        height:auto;
        text-align:center;
        gap:20px;
        width:95%;
        padding:25px;
    }

    .content h1{
        font-size:30px;
    }

    .offer{
        width:140px;
        height:140px;
        font-size:24px;
    }
}
</style>
</head>
<body>

<div class="banner">
    <div class="content">
        <h1>Summer Sale 2026</h1>
        <p>Get amazing discounts on all products.</p>
        <a href="#" class="btn">Shop Now</a>
    </div>

    <div class="offer">
        50%<br>OFF
    </div>
</div>

</body>
</html>

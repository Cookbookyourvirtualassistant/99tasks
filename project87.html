<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Flow Wireframe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    padding:40px;
}

h1{
    text-align:center;
    margin-bottom:40px;
    color:#333;
}

.flow-container{
    max-width:1200px;
    margin:auto;
}

.flow-row{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    gap:40px;
    margin-bottom:50px;
}

.box{
    width:220px;
    min-height:120px;
    background:white;
    border:3px solid #555;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.box h3{
    margin-bottom:10px;
}

.arrow{
    font-size:40px;
    color:#666;
}

.start{
    border-color:#22c55e;
}

.process{
    border-color:#3b82f6;
}

.decision{
    border-color:#f59e0b;
}

.end{
    border-color:#ef4444;
}

.legend{
    margin-top:40px;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.legend-item{
    background:white;
    padding:10px 20px;
    border-radius:8px;
    font-weight:bold;
}

.green{border-left:5px solid #22c55e;}
.blue{border-left:5px solid #3b82f6;}
.orange{border-left:5px solid #f59e0b;}
.red{border-left:5px solid #ef4444;}

@media(max-width:768px){
    .flow-row{
        flex-direction:column;
    }

    .arrow{
        transform:rotate(90deg);
    }
}
</style>
</head>
<body>

<h1>User Flow Wireframe</h1>

<div class="flow-container">

    <!-- Row 1 -->
    <div class="flow-row">

        <div class="box start">
            <h3>Start</h3>
            <p>User Opens App</p>
        </div>

        <div class="arrow">→</div>

        <div class="box process">
            <h3>Login Screen</h3>
            <p>Enter Credentials</p>
        </div>

        <div class="arrow">→</div>

        <div class="box decision">
            <h3>Validation</h3>
            <p>Credentials Correct?</p>
        </div>

    </div>

    <!-- Row 2 -->
    <div class="flow-row">

        <div class="box process">
            <h3>Dashboard</h3>
            <p>Access Main Features</p>
        </div>

        <div class="arrow">→</div>

        <div class="box process">
            <h3>Profile Page</h3>
            <p>Manage Account</p>
        </div>

        <div class="arrow">→</div>

        <div class="box end">
            <h3>Logout</h3>
            <p>Session Ends</p>
        </div>

    </div>

    <!-- Legend -->
    <div class="legend">

        <div class="legend-item green">
            Start
        </div>

        <div class="legend-item blue">
            Process
        </div>

        <div class="legend-item orange">
            Decision
        </div>

        <div class="legend-item red">
            End
        </div>

    </div>

</div>

</body>
</html>
